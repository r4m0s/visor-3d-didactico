<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor 3D - Ultra Responsive Moss</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root {
            --moss-base: #636B2F;
            --moss-light: #8a9443;
            --moss-soft: #dce0cc;
            --bg-page: #f4f5ee;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden !important;
            overscroll-behavior: none;
            background-color: var(--bg-page);
            color: var(--moss-base);
            font-family: 'Segoe UI', sans-serif;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background-color: var(--bg-page);
            display: flex;
            flex-direction: column;
            transition: opacity 0.8s ease-in-out;
        }

        /* --- TÍTULO RESPONSIVO --- */
        .top-title {
            position: absolute;
            top: 5%;
            right: 5%;
            text-align: right;
            z-index: 30;
            max-width: 90%;
        }

        .top-title h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem); /* Tamaño fluido */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .title-line {
            width: 58%;
            height: 4px;
            background: var(--moss-light);
            display: inline-block;
            margin-top: 5px;
        }

        /* --- CONSEJOS (TIPS) RESPONSIVOS --- */
        .tips-container {
            position: absolute;
            top: 30%;
            right: 5%;
            width: 375px;
            max-width: 80vw; /* No se sale en pantallas pequeñas */
            text-align: right;
            z-index: 25;
        }

        .tip-box {
            background-color: rgba(99, 107, 47, 0.05);
            padding: clamp(10px, 3vw, 20px);
            border-right: 5px solid var(--moss-base);
            transition: opacity 0.5s ease;
        }

        .tip-label {
            font-size: clamp(0.7rem, 2vw, 1rem);
            font-weight: 900;
            text-transform: uppercase;
            color: var(--moss-light);
            display: block;
            margin-bottom: 8px;
        }

        .tip-text {
            font-size: clamp(0.7rem, 3.5vw, 0.8rem); /* x1.5 respecto al original */
            line-height: 1.3;
            font-style: italic;
            font-weight: 400;
        }

        /* --- VISOR 3D (Z-INDEX BAJO) --- */
        .model-container {
            position: absolute;
            top: 50%;
            left: -15%; /* Desplazado a la derecha como pediste */
            transform: translateY(-50%);
            width: 100%;
            height: 80%;
            z-index: 1;
            pointer-events: auto;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            outline: none;
            --progress-bar-height: 0px;
        }

        /* --- BARRA DE CARGA RESPONSIVA --- */
        .progress-container {
            position: absolute;
            bottom: 5%;
            right: 5%;
            width: 350px;
            max-width: 90vw;
            z-index: 30;
            text-align: right;
        }

        .progress {
            height: 12px;
            border-radius: 20px;
            background-color: var(--moss-soft);
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--moss-base) !important;
        }

        .progress-text {
            font-weight: 700;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            margin-bottom: 8px;
        }

        /* --- MEDIA QUERIES PARA MÓVILES --- */
        @media (max-width: 768px) {
            .model-container {
                left: 0; /* Centramos el modelo en móvil para ganar espacio */
                top: 55%;
                height: 60%;
            }
            .tips-container {
                top: 25%; /* Un poco más arriba en móviles */
            }
        }

        .fade-out { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loading-screen">

        <div class="top-title">
            <h1 class="display-6">Visor 3D Interactivo</h1>
            <div class="title-line"></div>
        </div>

        <div class="tips-container">
            <div class="tip-box" id="tip-box">
                <span class="tip-label">Ayuda del Visor</span>
                <p class="tip-text" id="tip-content">Haz clic y arrastra para orbitar alrededor del modelo y verlo desde cualquier ángulo.</p>
            </div>
        </div>

        <div class="model-container">
            <model-viewer
                id="robot-model"
                src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb"
                autoplay
                animation-name="Dance"
                camera-controls
                interaction-prompt="none"
                shadow-intensity="1.5"
                exposure="1"
                scale="1.4 1.4 1.4"
                camera-orbit="0deg 75deg 105%"
                loading="eager">
            </model-viewer>
        </div>

        <div class="progress-container">
            <div class="progress-text"><span id="loading-msg">Cargando dependencias...</span> <span id="percent-text">0%</span></div>
            <div class="progress">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
            </div>
        </div>

    </div>

    <script>
        const modelViewer = document.querySelector('#robot-model');

        // 1. Consejos Dinámicos
        const tips = [
            "Haz clic y arrastra para orbitar alrededor del modelo y verlo desde cualquier ángulo.",
            "Usa la rueda del ratón o pellizca la pantalla para hacer zoom y ver los detalles de cerca.",
            "La fluidez de la órbita depende de la potencia de tu dispositivo."
        ];
        let currentTip = 0;

        setInterval(() => {
            const tipBox = document.getElementById('tip-box');
            tipBox.style.opacity = 0;
            setTimeout(() => {
                currentTip = (currentTip + 1) % tips.length;
                document.getElementById('tip-content').innerText = tips[currentTip];
                tipBox.style.opacity = 1;
            }, 500);
        }, 5000);

        // 2. Paletas de Colores Coordinadas
        const palettes = [
            [[0.1, 0.8, 0.9, 1], [0.6, 0.2, 0.8, 1], [1, 0.1, 0.5, 1]],
            [[0.4, 0.2, 0.1, 1], [0.8, 0.5, 0.2, 1], [0.9, 0.8, 0.5, 1]],
            [[0.0, 0.2, 0.4, 1], [0.2, 0.6, 0.8, 1], [0.7, 0.9, 0.9, 1]],
            [[0.39, 0.42, 0.18, 1], [0.54, 0.58, 0.26, 1], [0.26, 0.28, 0.12, 1]], // Paleta Moss
            [[1.0, 0.4, 0.4, 1], [1.0, 0.7, 0.4, 1], [1.0, 0.9, 0.4, 1]]
        ];
        let currentPaletteIndex = 0;

        const colorInterval = setInterval(() => {
            if (modelViewer?.model) {
                const palette = palettes[currentPaletteIndex];
                modelViewer.model.materials.forEach((m, i) => {
                    m.pbrMetallicRoughness.setBaseColorFactor(palette[i % palette.length]);
                });
                currentPaletteIndex = (currentPaletteIndex + 1) % palettes.length;
            }
        }, 2000);

        // 3. Lógica de 10 Segundos y Redirección
        document.addEventListener("DOMContentLoaded", () => {
            const progressBar = document.getElementById('progress-bar');
            const percentText = document.getElementById('percent-text');
            const loadingMsg = document.getElementById('loading-msg');
            const loadingScreen = document.getElementById('loading-screen');

            let elapsedTime = 0;
            const totalTime = 20000;

            const updateProgress = setInterval(() => {
                elapsedTime += 100;
                let progress = (elapsedTime / totalTime) * 100;

                if (progress >= 100) {
                    progress = 100;
                    clearInterval(updateProgress);
                    clearInterval(colorInterval);
                    loadingScreen.classList.add('fade-out');
                    setTimeout(() => { window.location.href = "index18.html"; }, 800);
                }

                progressBar.style.width = `${progress}%`;
                percentText.innerText = `${Math.floor(progress)}%`;

                if (progress <= 30) loadingMsg.innerText = "Cargando dependencias...";
                else if (progress <= 67) loadingMsg.innerText = "Cargando recursos...";
                else loadingMsg.innerText = "Cargando repositorios...";
            }, 100);
        });
    </script>

</body>
</html>
